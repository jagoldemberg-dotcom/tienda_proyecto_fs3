<section class="mx-auto card card-soft p-4 p-lg-5" style="max-width:720px"><div class="text-center mb-4"><h1 class="section-title">Recuperar contraseña</h1><p class="small-muted mb-0">Se simula el envío de un correo de recuperación.</p></div><form #formRecuperar="ngForm" (ngSubmit)="recuperar()"><div class="mb-3"><label class="form-label">Correo electrónico</label><input type="email" class="form-control" name="correo" [(ngModel)]="correo" required email #correoCtrl="ngModel"><div class="text-danger small mt-1" *ngIf="correoCtrl.invalid && correoCtrl.touched">Debes ingresar un correo válido.</div></div><button class="btn btn-nm w-100" [disabled]="formRecuperar.invalid">Recuperar contraseña</button><div class="alert alert-info mt-3" *ngIf="mensaje">{{ mensaje }}</div><div class="text-center mt-3"><a routerLink="/login">Volver al login</a></div></form></section>
