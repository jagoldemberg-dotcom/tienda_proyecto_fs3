<section class="card card-soft p-4 p-lg-5 mx-auto" style="max-width:720px" *ngIf="usuario"><div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4"><div><h1 class="section-title mb-1">Modificación de perfil</h1><p class="small-muted mb-0">Actualiza tus datos personales según el rol de la sesión.</p></div><span class="badge rounded-pill badge-role px-3 py-2">{{ usuario.rol }}</span></div><form #perfilForm="ngForm" (ngSubmit)="guardar()"><div class="row g-3"><div class="col-12 col-md-6"><label class="form-label">Nombre completo</label><input class="form-control" type="text" name="nombreCompleto" [(ngModel)]="usuario.nombreCompleto" required minlength="5" maxlength="120"></div><div class="col-12 col-md-6"><label class="form-label">Correo</label><input class="form-control" type="email" name="correo" [(ngModel)]="usuario.correo" required email></div><div class="col-12 col-md-6"><label class="form-label">Contraseña</label><input class="form-control" type="password" name="password" [(ngModel)]="usuario.password" required minlength="8" maxlength="20"></div><div class="col-12 col-md-6"><label class="form-label">Estado</label><select class="form-select" name="activo" [(ngModel)]="usuario.activo"><option [ngValue]="1">Activo</option><option [ngValue]="0">Inactivo</option></select></div></div><div class="alert alert-success mt-3" *ngIf="mensaje">{{ mensaje }}</div><button class="btn btn-nm mt-3" [disabled]="perfilForm.invalid">Guardar cambios</button></form></section>
